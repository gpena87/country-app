@if (countryResource.error()) {
  <app-not-found />
}

@if (countryResource.isLoading()) {
  <section class="flex flex-col items-center justify-center mt-10">
    <h1>Cargando...</h1>
  </section>
}

@if (countryResource.value()) {
    <country-information-page [country]="countryResource.value()!" />
}
