
<!-- country-search-input -->
<section>
  <input
    type="text"
    class="input input-bordered mr-2 w-56"
    placeholder="Buscar por capital"
    autoFocus
    #txtSearch
    (keyup.enter)="onSearch( txtSearch.value )"
  />
  <button
    class="btn btn-primary"
    (click)="onSearch( txtSearch.value )"
  >
    Buscar
  </button>
</section>

<!-- country-list -->
<section class="mt-5">
  <table class="table table-md mt-2 w-full">
    <thead>
      <tr>
        <th>#</th>
        <th>Icono</th>
        <th>Bandera</th>
        <th>Nombre</th>
        <th>Capital</th>
        <th>Población</th>
        <th></th>
      </tr>
    </thead>
  </table>
</section>
